services:
  integration-test:
    image: shuttle-gate-integration-test:local
    build:
      context: .
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    user: "0:0"
    network_mode: none
    cap_drop: ["ALL"]
    cap_add: ["NET_ADMIN"]
    security_opt: ["no-new-privileges:true"]
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv6.conf.all.forwarding: "1"
    working_dir: /app
    entrypoint: ["./test", "--container-integration"]

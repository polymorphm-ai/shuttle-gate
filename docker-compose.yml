services:
  tool:
    image: shuttle-gate:local
    build:
      context: .
      target: runtime
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    user: "${SG_UID:-1000}:${SG_GID:-1000}"
    network_mode: none
    working_dir: /workspace
    volumes:
      - type: bind
        source: "${SG_ROOT:-.}"
        target: /workspace
        bind:
          create_host_path: false
    entrypoint: ["python", "-m", "shuttle_gate"]

  doctor:
    image: shuttle-gate:local
    build:
      context: .
      target: runtime
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    cap_drop: ["ALL"]
    cap_add: ["NET_ADMIN", "DAC_READ_SEARCH"]
    security_opt: ["no-new-privileges:true"]
    working_dir: /workspace
    volumes:
      - type: bind
        source: "${SG_ROOT:-.}"
        target: /workspace
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${SG_ROOT:-.}/secrets"
        target: /secrets
        read_only: true
        bind:
          create_host_path: false
    entrypoint: ["python", "-m", "shuttle_gate"]
    command: ["doctor"]

  gateway:
    image: shuttle-gate:local
    build:
      context: .
      target: runtime
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    init: true
    cap_drop: ["ALL"]
    cap_add: ["NET_ADMIN", "NET_BIND_SERVICE", "DAC_READ_SEARCH"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs:
      - /run:mode=0755
      - /tmp:mode=1777
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv6.conf.all.forwarding: "1"
    volumes:
      - type: bind
        source: "${SG_ROOT:-.}/config.yaml"
        target: /config/config.yaml
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${SG_ROOT:-.}/secrets"
        target: /secrets
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: "${SG_ROOT:-.}/state"
        target: /state
        read_only: true
        bind:
          create_host_path: false
    environment:
      HOME: /run/shuttle-gate-home
      PYTHONDONTWRITEBYTECODE: "1"
    entrypoint: ["python", "-m", "shuttle_gate"]
    command: ["runtime"]
    healthcheck:
      test: ["CMD", "python", "-m", "shuttle_gate", "health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    stop_grace_period: 20s

  test:
    image: shuttle-gate-test:local
    build:
      context: .
      target: test
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    network_mode: none
    working_dir: /app
    entrypoint: ["python", "-m", "pytest"]

  integration-test:
    image: shuttle-gate-test:local
    build:
      context: .
      target: test
      args:
        PYTHON_VERSION: "${SG_PYTHON_VERSION:-3.14}"
    network_mode: none
    cap_drop: ["ALL"]
    cap_add: ["NET_ADMIN"]
    security_opt: ["no-new-privileges:true"]
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
      net.ipv6.conf.all.forwarding: "1"
    working_dir: /app
    entrypoint: ["python", "-m", "pytest"]
